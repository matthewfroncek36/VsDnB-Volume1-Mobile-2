name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  buildAndroid:
    name: buildAndroid
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: ShadowEngineTeam/setup-haxe@main
        with:
          haxe-version: 4.3.7

      - name: Install Haxelib
        run: |
          echo "HAXEPATH=$(dirname "$(which haxe)")" >> "$GITHUB_ENV"
          export HAXEPATH="$(dirname "$(which haxe)")"
          haxelib setup "$HOME/haxelib"
          haxelib install hmm --quiet
          haxelib run hmm install

      - name: Setup Lime
        run: |
          haxelib run lime config ANDROID_SDK "$ANDROID_HOME"
          haxelib run lime config ANDROID_NDK_ROOT "$ANDROID_NDK_LATEST_HOME"
          haxelib run lime config JAVA_HOME "$JAVA_HOME_21_arm64"
          haxelib run lime config ANDROID_SETUP true

      - name: Rebuild Lime (Android)
        run: haxelib run lime rebuild android -clean

      - name: Compile
        run: haxelib run lime build android -ONLY_ARM64

      - name: Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildAndroid
          path: |
            export/release/android/**
            export/debug/android/**
          if-no-files-found: warn
